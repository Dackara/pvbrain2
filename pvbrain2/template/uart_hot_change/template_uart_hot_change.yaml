      - "ODD"
    initial_option: "NONE"
    optimistic: true
    restore_value: True
    internal: false
    entity_category: config
    icon: mdi:swap-horizontal
    set_action:
      - lambda: |-
          id(uart_esp_0).flush();
          auto opt_index = id(uart_esp_0_change_parity).index_of(x);
          if (!opt_index.has_value()) {
            ESP_LOGW("change_parity", "Option invalide: %s", x.c_str());
            return;
          }
          auto new_parity = static_cast<esphome::uart::UARTParityOptions>(opt_index.value());
          ESP_LOGI("change_parity", "Parité UART changée: %d → %d", id(uart_esp_0).get_parity(), new_parity);

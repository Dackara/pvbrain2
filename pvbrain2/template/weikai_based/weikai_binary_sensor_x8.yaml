esphome:
  devices:
    - id: ${weikai_name}_device
      name: "GPIO ${weikai_name}"

binary_sensor:
  - platform: gpio
    id: ${weikai_name}_output_pin_0
    name: ${name}_${weikai_name}_output_pin_0
    device_id: ${weikai_name}_device
    pin:
      wk2168_spi: ${weikai_id} #uart_bridge0
      number: 0
      mode:
        input: true
      inverted: ${weikai_inverted_pin0} #false

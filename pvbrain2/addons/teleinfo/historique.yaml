# https://esphome.io/components/sensor/teleinfo.html
teleinfo:
  - uart_id: ${linky_uartid}
    id: ${linky_name}
    update_interval: ${linky_update_interval}
    historical_mode: true

esphome:
  devices:
    - id: linky_device
      name: "Linky TeleInfo Client"

# https://esphome.io/components/sensor/index.html
sensor:
  # Intensité souscrite
  - platform: teleinfo
    tag_name: "ISOUSC"
    name: ${name}_${linky_name}_intensite_souscrite
    device_id: linky_device
    unit_of_measurement: A
    device_class: current
    state_class: measurement
  # Avertissement de Dépassement De Puissance Souscrite
  - platform: teleinfo
    tag_name: "ADPS"
    name: ${name}_${linky_name}_intensite_instantanee_depassement
    device_id: linky_device
    unit_of_measurement: A
    device_class: current
    state_class: measurement
  # Puissance apparente
  - platform: teleinfo
    tag_name: "PAPP"
    name: ${name}_${linky_name}_puissance_apparente
    device_id: linky_device
    unit_of_measurement: VA
    state_class: measurement
    device_class: apparent_power
    icon: mdi:flash
  # Puissance maximale atteinte
  - platform: teleinfo
    tag_name: "PMAX"
    name: ${name}_${linky_name}_puissance_maximale
    device_id: linky_device
    unit_of_measurement: W
    state_class: measurement
    device_class: power

#------------------------#
# MODE HISTORIQUE - BASE #
#------------------------#

  # Index option Base
  - platform: teleinfo
    tag_name: "BASE"
    name: ${name}_${linky_name}_index_base
    device_id: linky_device
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    icon: mdi:gauge
    filters:
      - multiply: 0.001


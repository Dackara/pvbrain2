# https://esphome.io/components/text_sensor/index.html
text_sensor:
  # Adresse du compteur
  - platform: teleinfo
    tag_name: "ADCO"
    name: ${name}_${linky_name}_adresse
    device_id: linky_device
  # Option tarifaire choisie
  - platform: teleinfo
    tag_name: "OPTARIF"
    name: ${name}_${linky_name}_option_tarifaire
    device_id: linky_device
  # Période Tarifaire en cours
  - platform: teleinfo
    tag_name: "PTEC"
    name: ${name}_${linky_name}_periode_tarifaire
    device_id: linky_device
    icon: mdi:clock-time-nine-outline
  # Mot d'état du compteur
  - platform: teleinfo
    tag_name: "MOTDETAT"
    name: ${name}_${linky_name}_mot_d_etat
    device_id: linky_device
  # Présence des potentiels
  - platform: teleinfo
    tag_name: "PPOT"
    name: ${name}_${linky_name}_presence_potentiels
    device_id: linky_device
    
  # Préavis Début EJP (30 min)
  - platform: teleinfo
    tag_name: "PEJP"
    name: ${name}_${linky_name}_preavis_ejp
    device_id: linky_device
  
  # Couleur du lendemain
  - platform: teleinfo
    tag_name: "DEMAIN"
    name: ${name}_${linky_name}_couleur_demain
    device_id: linky_device
    
  # Horaire Heures Pleines Heures Creuses
  - platform: teleinfo
    tag_name: "HHPHC"
    name: ${name}_${linky_name}_horaire_hp_hc
    device_id: linky_device
